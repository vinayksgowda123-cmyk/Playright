name: Playwright Tests & Allure Report

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Required permissions for the peaceiris/actions-gh-pages step to push to the gh-pages branch
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test-and-report:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        
    - name: Install Dependencies
      run: npm ci
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      
    - name: Run Playwright Tests
      run: npx playwright test
      continue-on-error: true # Ensures the workflow continues to generate the report even if tests fail
      
    - name: Generate Allure Report
      if: always() # Runs regardless of test success/failure
      run: npx allure generate allure-results -o allure-report --clean
      
    - name: Deploy to GitHub Pages
      if: always() # Runs regardless of test success/failure
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-report